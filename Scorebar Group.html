<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>OBS Scorebar Final Fix</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; margin: 0; }
        .card { background: #2d2d2d; padding: 40px; border-radius: 20px; text-align: center; width: 450px; border: 1px solid #444; }
        button { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 12px; transition: 0.3s; }
        button:hover { background: #0056b3; transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 14px; padding: 10px; border-radius: 8px; background: #000; color: #aaa; }
        .success { color: #4CAF50 !important; border: 1px solid #4CAF50; }
    </style>
</head>
<body>

    <div class="card">
        <h2>OBS AUTOMATION</h2>
        <button id="btnCreate">สร้าง Scorebar Group ลง Scene ปัจจุบัน</button>
        <div id="status">รอการเชื่อมต่อ Websocket...</div>
    </div>

    <script>
        class OBSControl {
            constructor() { this.socket = null; this.requestId = 1; this.requests = new Map(); }
            connect(url) {
                return new Promise((resolve) => {
                    this.socket = new WebSocket(url);
                    this.socket.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);
                        if (data.op === 0) this.socket.send(JSON.stringify({ op: 1, d: { rpcVersion: 1, eventSubscriptions: 33 } }));
                        if (data.op === 2) { 
                            document.getElementById('status').innerText = "เชื่อมต่อ OBS แล้ว (Port 4455)"; 
                            document.getElementById('status').classList.add("success");
                            resolve(); 
                        }
                        if (data.op === 7) {
                            const req = this.requests.get(data.d.requestId);
                            if (req) { req.resolve(data.d.responseData); this.requests.delete(data.d.requestId); }
                        }
                    };
                });
            }
            async call(requestType, requestData = {}) {
                return new Promise((resolve, reject) => {
                    const requestId = (this.requestId++).toString();
                    this.requests.set(requestId, { resolve, reject });
                    this.socket.send(JSON.stringify({ op: 6, d: { requestType, requestId, requestData } }));
                });
            }
        }

        const obs = new OBSControl();
        obs.connect('ws://127.0.0.1:4455');

        document.getElementById('btnCreate').onclick = async () => {
            try {
                const { currentProgramSceneName } = await obs.call('GetCurrentProgramScene');
                const sceneItemIds = [];

                // ข้อมูล Source และการตั้งค่าจากไฟล์ Preset
                const itemsToCreate = [
                    { name: "Color Source 9", kind: "color_source_v3", settings: { color: 4278190080, width: 652, height: 144 } },
                    { name: "Color Source 10", kind: "color_source_v3", settings: { color: 4294967295 } },
                    { name: "score_team_a", kind: "text_gdiplus_v2", settings: { text: "0", font: { face: "Srinakharinwirot", size: 72 } } },
                    { name: "score_team_b", kind: "text_gdiplus_v2", settings: { text: "0", font: { face: "Srinakharinwirot", size: 72 } } },
                    { name: "time_counter", kind: "text_gdiplus_v2", settings: { text: "00:00", font: { face: "Srinakharinwirot" } } }
                ];

                // 1. สร้าง Source รายตัวและเก็บ ID ไว้
                for (const item of itemsToCreate) {
                    try {
                        const res = await obs.call('CreateInput', {
                            sceneName: currentProgramSceneName,
                            inputName: item.name,
                            kind: item.kind,
                            inputSettings: item.settings,
                            sceneItemEnabled: true
                        });
                        sceneItemIds.push(res.sceneItemId);
                    } catch (e) {
                        // หากมีอยู่แล้ว ให้ดึง ID เดิมมา
                        const { sceneItems } = await obs.call('GetSceneItemList', { sceneName: currentProgramSceneName });
                        const existing = sceneItems.find(i => i.sourceName === item.name);
                        if (existing) sceneItemIds.push(existing.sceneItemId);
                    }
                }

                // 2. สั่งรวบกลุ่ม (Group) โดยใส่ ID ของ Source ทั้งหมดเข้าไปพร้อมกัน
                // ใน OBS 5.x คำสั่ง CreateGroup ต้องการ sceneItemIds เป็น Array
                await obs.call('CreateGroup', {
                    sceneName: currentProgramSceneName,
                    groupName: "Scorebar_Group",
                    sceneItemIds: sceneItemIds
                });

                alert("สร้าง Scorebar Group เรียบร้อยใน Scene: " + currentProgramSceneName);

            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาด: " + (error.comment || "โปรโตคอลไม่ถูกต้อง"));
            }
        };
    </script>
</body>
</html>
