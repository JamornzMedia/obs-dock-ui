<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PPT Remote Controller - Mobile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="mobile-container">
    <!-- Header -->
    <header class="mobile-header">
      <div class="brand">
        <i class="fa-solid fa-file-powerpoint brand-icon"></i>
        <span>PPT Remote</span>
      </div>
      <div class="header-actions-mobile">
        <button id="toggleFullscreenBrowserBtn" class="fullscreen-btn" onclick="toggleMobileBrowserFullscreen()" title="เปิด/ปิด เต็มจอบราวเซอร์">
          <i class="fa-solid fa-expand"></i> เต็มจอ
        </button>
        <div class="connection-status" id="mobileStatus">
          <span class="dot disconnected"></span>
          <span class="status-label">Offline</span>
        </div>
      </div>
    </header>

    <!-- Room ID Bar -->
    <div class="room-selector-card">
      <div class="room-display">
        <span class="text-muted">ROOM:</span>
        <strong id="activeRoomCode">NOT CONNECTED</strong>
      </div>
      <button id="changeRoomBtn" class="change-room-btn">
        <i class="fa-solid fa-key"></i> เปลี่ยนห้อง
      </button>
    </div>

    <!-- Mode Selector Tabs -->
    <nav class="mobile-nav-tabs">
      <button class="mobile-tab-btn active" data-tab="paneControls">
        <i class="fa-solid fa-gamepad"></i> ควบคุม PPT
      </button>
      <button class="mobile-tab-btn" data-tab="paneLaser">
        <i class="fa-solid fa-crosshairs"></i> ตัวชี้ Laser 16:9
      </button>
    </nav>

    <!-- Main Navigation Content Area -->
    <main class="remote-main">
      
      <!-- PANE 1: PPT Slide Controls -->
      <section id="paneControls" class="tab-pane-mobile active">
        <!-- Big Touch Area for Next / Prev -->
        <div class="big-nav-container">
          <button class="touch-nav-btn prev-btn" onclick="sendRemoteKey('prev')">
            <i class="fa-solid fa-chevron-left"></i>
            <span>ย้อนกลับ</span>
          </button>

          <button class="touch-nav-btn next-btn" onclick="sendRemoteKey('next')">
            <i class="fa-solid fa-chevron-right"></i>
            <span>สไลด์ถัดไป</span>
          </button>
        </div>

        <!-- Touchpad Swipe Zone -->
        <div id="swipeArea" class="swipe-touchpad">
          <div class="swipe-content">
            <i class="fa-solid fa-hand-pointer"></i>
            <span>แตะหรือปัดซ้าย-ขวาที่นี่เพื่อเลื่อนสไลด์</span>
          </div>
        </div>

        <!-- Prominent Switch PPT Window Button -->
        <button class="action-btn btn-alt-tab-hero" onclick="sendRemoteKey('alt+tab')" style="background: linear-gradient(135deg, #0284c7, #0369a1); color: #fff; font-weight:700; width:100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <i class="fa-solid fa-desktop"></i> 🖥️ สลับหน้าจอไป PowerPoint (Alt+Tab)
        </button>

        <!-- Slide Show Fullscreen & Quick Actions -->
        <div class="actions-grid-4col main-hero-grid">
          <button class="action-btn btn-f5-hero" onclick="sendRemoteKey('start')">
            <i class="fa-solid fa-expand"></i>
            <span>📺 เต็มจอ F5</span>
          </button>
          
          <button class="action-btn btn-current" onclick="sendRemoteKey('startCurrent')">
            <i class="fa-solid fa-play"></i>
            <span>หน้าปัจจุบัน</span>
          </button>

          <button class="action-btn btn-esc" onclick="sendRemoteKey('exit')">
            <i class="fa-solid fa-stop"></i>
            <span>จบการโชว์</span>
          </button>

          <button class="action-btn btn-dark-hero" onclick="sendRemoteKey('b')">
            <i class="fa-solid fa-desktop"></i>
            <span>จอดำ B</span>
          </button>
        </div>

        <!-- Slide Helpers Bar -->
        <div class="actions-grid-4col">
          <button class="tool-btn" onclick="sendRemoteKey('white')">
            <i class="fa-regular fa-square"></i>
            <span>จอขาว W</span>
          </button>

          <button class="tool-btn" onclick="sendRemoteKey('pen')">
            <i class="fa-solid fa-pen"></i>
            <span>ปากกา</span>
          </button>

          <button class="tool-btn" onclick="sendRemoteKey('eraser')">
            <i class="fa-solid fa-eraser"></i>
            <span>ยางลบ</span>
          </button>

          <button class="tool-btn" onclick="sendRemoteKey('f11')">
            <i class="fa-solid fa-up-right-and-down-left-from-center"></i>
            <span>F11 จอเต็ม</span>
          </button>
        </div>

        <!-- Custom Quick Bar -->
        <div class="custom-bar-section">
          <div class="section-label">คีย์ลัดด่วน (Custom Keys)</div>
          <div id="mobileCustomGrid" class="mobile-custom-grid">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </section>

      <!-- PANE 2: 16:9 Laser Pointer Control Surface -->
      <section id="paneLaser" class="tab-pane-mobile">
        
        <!-- Laser Action Bar: Power Toggle, Draw Toggle & Tweak Settings -->
        <div class="laser-action-bar">
          <button id="laserActiveToggleBtn" class="laser-power-btn active" onclick="toggleLaserActive()">
            <i class="fa-solid fa-power-off"></i> 🔴 เลเซอร์: ON
          </button>

          <button id="drawingModeToggleBtn" class="laser-power-btn" onclick="toggleDrawingModeBtn()" style="background: rgba(139, 92, 246, 0.2); border-color: var(--accent);">
            <i class="fa-solid fa-pen-nib"></i> 🎨 วาดรูป: OFF
          </button>

          <button class="settings-toggle-btn" onclick="toggleLaserSettings()">
            <i class="fa-solid fa-sliders"></i> ⚙️ ตั้งค่า
          </button>
        </div>

        <div class="laser-control-header">
          <!-- Laser Mode Switcher (Joystick, Absolute 16:9, Gyro Sensor) -->
          <div class="laser-mode-toggle">
            <button id="modeJoystickBtn" class="laser-mode-btn active" onclick="setLaserMode('joystick')">
              <i class="fa-solid fa-gamepad"></i> 🕹️ คันโยก
            </button>
            <button id="modeAbsoluteBtn" class="laser-mode-btn" onclick="setLaserMode('absolute')">
              <i class="fa-solid fa-bullseye"></i> 🎯 16:9 ตรง
            </button>
            <button id="modeGyroBtn" class="laser-mode-btn" onclick="setLaserMode('gyro')">
              <i class="fa-solid fa-mobile-screen-button"></i> 📱 Gyro
            </button>
          </div>
        </div>

        <!-- 1. Interactive Control Surfaces placed at the top (under mode selection) -->
        
        <!-- Interactive Touch Area Option A: 16:9 Touch Surface Box (For Absolute Mode) -->
        <div class="laser-touch-wrapper" id="touchSurfaceWrapper" style="display:none;">
          <div class="laser-ratio-box" id="laserTouchBox">
            <div class="ratio-grid-overlay"></div>
            <div class="touch-target-indicator" id="touchIndicator">
              <div class="core-dot"></div>
              <div class="ring-pulse" id="touchRingPulse"></div>
            </div>
            <div class="touch-instructions">
              <span id="laserModeHint">🎯 โหมด 16:9 ตรง: แตะและลากนิ้วบนจอนี้ จุดเลเซอร์จะย้ายตามและเขียนเส้นทันที</span>
            </div>
          </div>
        </div>

        <!-- Interactive Touch Area Option B: Circular Joystick (For Joystick Mode) -->
        <div class="joystick-wrapper-container" id="joystickControlArea" style="display:flex;">
          <div id="joystickPad" class="joystick-pad">
            <div class="joystick-arrow arrow-up"><i class="fa-solid fa-caret-up"></i></div>
            <div class="joystick-arrow arrow-down"><i class="fa-solid fa-caret-down"></i></div>
            <div class="joystick-arrow arrow-left"><i class="fa-solid fa-caret-left"></i></div>
            <div class="joystick-arrow arrow-right"><i class="fa-solid fa-caret-right"></i></div>
            <div id="joystickKnob" class="joystick-knob"></div>
          </div>
        </div>

        <!-- Interactive Touch Area Option C: Gyro Air-Mouse Hold Button (For Gyro Mode) -->
        <div class="gyro-touch-wrapper" id="gyroControlArea" style="display:none;">
          <button id="gyroHoldBtn" class="gyro-hold-btn">
            <i class="fa-solid fa-mobile-screen-button gyro-icon"></i>
            <span class="gyro-btn-title">🔴 กดค้างไว้ แล้วเอียงมือถือเพื่อยิงเลเซอร์</span>
            <small class="gyro-btn-sub">ปล่อยนิ้วเมื่อต้องการหยุดขยับจุดเลเซอร์ (ดับเบิ้ลคลิกเพื่อเปิดโหมดวาดรูป)</small>
          </button>
          <button id="gyroPermissionBtn" class="gyro-perm-btn" onclick="requestGyroPermission()" style="display:none;">
            🔑 ปลดล็อก Gyro Sensor (สำหรับ iPhone/iOS)
          </button>
        </div>

        <!-- 2. Whiteboard Drawing Toolbar (Shows below control surface when drawing mode is ON) -->
        <div id="drawingToolbar" class="drawing-toolbar" style="display:none;">
          <div class="draw-row">
            <button id="lockDrawBtn" class="draw-btn" onclick="toggleLockDraw()">
              <i class="fa-solid fa-lock-open"></i> วาดค้าง: OFF
            </button>
            <div class="draw-segmented">
              <button id="toolFreehandBtn" class="draw-tool-btn active" onclick="setDrawTool('freehand')">✍️ อิสระ</button>
              <button id="toolRectBtn" class="draw-tool-btn" onclick="setDrawTool('rect')">⬛ เหลี่ยม</button>
              <button id="toolCircleBtn" class="draw-tool-btn" onclick="setDrawTool('circle')">⚪ กลม</button>
            </div>
          </div>
          
          <div class="draw-row">
            <label class="draw-checkbox-label" style="cursor:pointer;">
              <input type="checkbox" id="fillShapeCheck" onchange="updateDrawSettings()"> ลงสีพื้นหลังรูปทรง
            </label>
            <div class="draw-opacity-container">
              <span>ความเข้ม:</span>
              <input type="range" id="drawOpacitySlider" min="10" max="100" step="10" value="100" oninput="updateDrawSettings()" style="width:70px; margin:0 5px;">
              <span id="drawOpacityVal">100</span>%
            </div>
          </div>
          
          <div class="draw-row">
            <div class="color-picker-group inline">
              <span class="color-dot active" style="background:#ef4444;" onclick="setLaserColor('#ef4444', this)"></span>
              <span class="color-dot" style="background:#10b981;" onclick="setLaserColor('#10b981', this)"></span>
              <span class="color-dot" style="background:#3b82f6;" onclick="setLaserColor('#3b82f6', this)"></span>
              <span class="color-dot" style="background:#f59e0b;" onclick="setLaserColor('#f59e0b', this)"></span>
            </div>
            <button id="clearDrawingsBtnInline" class="clear-draw-btn-inline" onclick="clearDrawings()">
              <i class="fa-solid fa-trash"></i> ล้างหน้าจอ
            </button>
          </div>
        </div>

        <!-- 3. Collapsible settings bar placed below controls -->
        <div id="laserSettingsBar" class="laser-settings-bar" style="display:none;">
          <div class="setting-item">
            <label>ขนาดจุดเลเซอร์ (<span id="dotSizeVal">24</span>px):</label>
            <input type="range" id="dotSizeSlider" min="10" max="60" value="24" oninput="updateLaserSettings()">
          </div>
          <div class="setting-item">
            <label>ความยาวหางเลเซอร์ (<span id="trailLenVal">12</span>):</label>
            <input type="range" id="trailLenSlider" min="0" max="30" value="12" oninput="updateLaserSettings()">
          </div>
          
          <!-- Joystick Settings -->
          <div id="joystickSettingItem" style="display:flex; flex-direction:column; gap:8px;">
            <div class="setting-item">
              <label>📈 Curve ความโค้งคันโยก (<span id="joystickCurveVal">2.0</span>):</label>
              <input type="range" id="joystickCurveSlider" min="0.1" max="2.0" step="0.1" value="2.0" oninput="updateLaserSettings()">
            </div>
            <div class="setting-item">
              <label>⚡ ความเร็วสูงสุดคันโยก (<span id="joystickSpeedVal">1.0</span>x):</label>
              <input type="range" id="joystickSpeedSlider" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateLaserSettings()">
            </div>
          </div>

          <!-- Gyro Settings -->
          <div id="gyroSettingItem" style="display:none; flex-direction:column; gap:8px;">
            <div class="setting-item">
              <label>↔️ ความไวแกนแนวนอน X (<span id="gyroSensXVal">5.0</span>x):</label>
              <input type="range" id="gyroSensXSlider" min="0.5" max="20.0" step="0.5" value="5.0" oninput="updateLaserSettings()">
            </div>
            <div class="setting-item">
              <label>↕️ ความไวแกนแนวตั้ง Y (<span id="gyroSensYVal">5.0</span>x):</label>
              <input type="range" id="gyroSensYSlider" min="0.5" max="20.0" step="0.5" value="5.0" oninput="updateLaserSettings()">
            </div>
            <div class="setting-item">
              <label>⚖️ ความนิ่ง / Stabilizer (<span id="gyroStabVal">0.3</span>):</label>
              <input type="range" id="gyroStabSlider" min="0.05" max="1.0" step="0.05" value="0.3" oninput="updateLaserSettings()">
            </div>
            <div class="setting-item">
              <label>แกนแนวนอน X:</label>
              <select id="gyroAxisXSelect" onchange="updateLaserSettings()" style="padding:4px; font-size:11px; background:#1e293b; color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:6px;">
                <option value="alpha" selected>Alpha (หมุนหัวมือถือ)</option>
                <option value="gamma">Gamma (เอียงซ้าย-ขวา)</option>
                <option value="beta">Beta (ก้ม-เงย)</option>
              </select>
            </div>
            <div class="setting-item">
              <label style="cursor:pointer;"><input type="checkbox" id="gyroInvertXCheck" checked onchange="updateLaserSettings()"> 🔄 กลับทิศ X (Invert X)</label>
            </div>
            <div class="setting-item">
              <label>แกนแนวตั้ง Y:</label>
              <select id="gyroAxisYSelect" onchange="updateLaserSettings()" style="padding:4px; font-size:11px; background:#1e293b; color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:6px;">
                <option value="beta" selected>Beta (ก้ม-เงย)</option>
                <option value="gamma">Gamma (เอียงซ้าย-ขวา)</option>
                <option value="alpha">Alpha (หมุนหัวมือถือ)</option>
              </select>
            </div>
            <div class="setting-item">
              <label style="cursor:pointer;"><input type="checkbox" id="gyroInvertYCheck" checked onchange="updateLaserSettings()"> 🔄 กลับทิศ Y (Invert Y)</label>
            </div>
            <div class="setting-item">
              <label style="cursor:pointer;"><input type="checkbox" id="pulseRingCheck" checked onchange="updateLaserSettings()"> ⭕ วงแหวนกระจายรอบจุด (Pulse Ring)</label>
            </div>
          </div>

          <!-- DLSS Motion Smoothing -->
          <div class="setting-item" style="border-top:1px solid rgba(255,255,255,0.08); padding-top:10px; margin-top:10px;">
            <label style="cursor:pointer; font-weight:700; color:#10b981; display:flex; align-items:center; gap:6px;">
              <input type="checkbox" id="dlssEnabledCheck" checked onchange="updateLaserSettings()"> 🚀 เปิดใช้ DLSS Motion Smoothing
            </label>
          </div>
          <div class="setting-item">
            <label>ระดับความสมูท DLSS (<span id="dlssLevelVal">5</span>):</label>
            <input type="range" id="dlssLevelSlider" min="1" max="10" value="5" oninput="updateLaserSettings()">
          </div>

          <!-- Core Dot Styling -->
          <div class="setting-item">
            <label>🎯 สีแกนกลางจุด Dot:</label>
            <select id="coreDotStyleSelect" onchange="updateLaserSettings()" style="width:100%; padding:6px; font-size:12px; background:#1e293b; color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:6px;">
              <option value="white" selected>Bright White (ขาวสว่าง)</option>
              <option value="laser">Match Laser Color (สีเดียวกับเลเซอร์)</option>
            </select>
          </div>

          <!-- Whiteboard Settings inside Main settings bar -->
          <div class="setting-item" style="border-top:1px solid rgba(255,255,255,0.08); padding-top:10px;">
            <label>📏 ขนาดเส้นปากกาสำหรับวาด (<span id="drawSizeVal">5</span>px):</label>
            <input type="range" id="drawSizeSlider" min="1" max="20" value="5" oninput="updateDrawSettings()">
          </div>
        </div>

        <!-- Quick Slide Navigation Bar inside Laser Tab -->
        <div class="laser-nav-bar">
          <button class="laser-nav-btn prev" onclick="sendRemoteKey('prev')">
            <i class="fa-solid fa-chevron-left"></i> ⏮️ ย้อนกลับ
          </button>
          
          <button class="laser-nav-btn switch-tab" onclick="sendRemoteKey('alt+tab')">
            <i class="fa-solid fa-desktop"></i> 🖥️ สลับหน้าจอ PPT
          </button>

          <button class="laser-nav-btn next" onclick="sendRemoteKey('next')">
            ⏭️ สไลด์ถัดไป <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>

      </section>

    </main>

    <!-- Room Entry Modal -->
    <div id="roomModal" class="mobile-modal active">
      <div class="modal-card">
        <div class="modal-title">
          <i class="fa-solid fa-qrcode"></i> เชื่อมต่อกับคอมพิวเตอร์
        </div>
        <p class="modal-desc">กรอก Room Code ตัวเลข 6 หลักที่แสดงบนหน้าจอคอมพิวเตอร์ (เช่น 849201)</p>

        <div class="input-group">
          <input type="text" id="roomCodeInput" placeholder="849201" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off">
          <button id="joinRoomBtn" class="join-btn">เชื่อมต่อ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Compatibility SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
