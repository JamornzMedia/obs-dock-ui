<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f0f0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        th, td { padding: 8px; text-align: center; border: 1px solid #ddd; }
        
        /* การปรับแต่งคอลัมน์ 6 และ 7 */
        .col-bold { font-weight: bold; font-size: 1.1em; }
        .col-sep { border-right: 3px solid #333 !important; }

        /* ระบบสีช่องคะแนน */
        .score-input { width: 80%; padding: 5px; border: 1px solid #ccc; text-align: center; }
        .score-empty { background-color: #FFD700; } /* เหลือบส้มเหลือง */
        .score-cut { background-color: #FF0000; color: white; font-weight: bold; } /* แดง */
        .score-normal { background-color: #FFFFFF; }

        /* Accordion */
        .round-header { background: #333; color: white; padding: 10px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .round-content { display: none; padding: 10px; border: 1px solid #ccc; background: #fff; }
    </style>
</head>
<body>

    <div class="round-header" onclick="toggleRound('round1')">▼ รอบแรก (กดเพื่อเปิด/ซ่อน)</div>
    <div id="round1" class="round-content">
        <table>
            <thead>
                <tr>
                    <th>ทีม</th>
                    <th class="col-bold col-sep">คอลัมน์ 6</th>
                    <th class="col-bold">คอลัมน์ 7</th>
                    <th>คะแนน</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ทีม A</td>
                    <td class="col-sep">ข้อมูล</td>
                    <td>ข้อมูล</td>
                    <td><input type="text" class="score-input score-empty" oninput="checkStyle(this)" placeholder="ว่าง"></td>
                </tr>
                <tr>
                    <td>ทีม B</td>
                    <td class="col-sep">ข้อมูล</td>
                    <td>ข้อมูล</td>
                    <td><input type="text" class="score-input score-cut" oninput="checkStyle(this)" value="ตัด"></td>
                </tr>
            </tbody>
        </table>
    </div>

<script>
    // ฟังก์ชันซ่อน/แสดง
    function toggleRound(id) {
        var el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    // ฟังก์ชันเปลี่ยนสีอัตโนมัติเมื่อพิมพ์
    function checkStyle(el) {
        const val = el.value.trim();
        if (val === "ตัด") {
            el.className = "score-input score-cut";
        } else if (val === "") {
            el.className = "score-input score-empty";
        } else {
            el.className = "score-input score-normal";
        }
    }
</script>

</body>
</html>
