<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .match-container { max-width: 600px; margin: auto; }
        .header-info { text-align: center; color: #fbbf24; margin-bottom: 20px; font-size: 1.2em; font-weight: bold; }
        .match-row { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #1e293b; margin: 8px 0; padding: 15px; border-radius: 10px; 
            border-left: 4px solid #4f46e5;
        }
        .team { width: 35%; text-align: center; font-weight: 600; font-size: 1.1em; }
        .score { 
            background: #ef4444; padding: 6px 16px; border-radius: 8px; 
            font-weight: bold; font-size: 1.2em; min-width: 40px; text-align: center;
        }
    </style>
</head>
<body>

<div class="match-container" id="match-list">
    <div id="header" class="header-info">กำลังโหลด...</div>
</div>

<script>
    const sheetID = "1kx1u-vD_xSBHSVqCYZTPSl29U4l2yjGqE8EvJx07Ohc";
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    fetch(url)
        .then(res => res.text())
        .then(text => {
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const container = document.getElementById('match-list');
            const headerDiv = document.getElementById('header');
            
            // ดึงข้อมูลจากแถวแรก (สมมติว่าเป็นหัวข้อ) มาโชว์ด้านบน
            const h1 = json.table.rows[0].c[5]?.v || ""; // คอลัมน์ 6
            const h2 = json.table.rows[0].c[6]?.v || ""; // คอลัมน์ 7
            headerDiv.innerHTML = `${h1} ${h2}`;

            // ล้างข้อมูลเก่า
            container.innerHTML = `<div class="header-info">${h1} ${h2}</div>`;

            // ดึงข้อมูลแถวถัดไปทั้งหมด
            json.table.rows.forEach((row, index) => {
                if (index === 0) return; // ข้ามแถวหัวข้อ

                const teamLeft = row.c[2]?.v; // คอลัมน์ 3
                const score = row.c[7]?.v;    // คอลัมน์ 8
                const teamRight = row.c[4]?.v; // คอลัมน์ 5

                // ถ้าแถวนั้นมีข้อมูลอย่างน้อย 1 อย่างให้แสดง
                if (teamLeft || teamRight || score) {
                    container.innerHTML += `
                        <div class="match-row">
                            <div class="team">${teamLeft || "-"}</div>
                            <div class="score">${score || "-"}</div>
                            <div class="team">${teamRight || "-"}</div>
                        </div>
                    `;
                }
            });
        });
</script>
</body>
</html>
