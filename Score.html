<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .match-container { max-width: 600px; margin: auto; }
        .date-label { color: #94a3b8; padding: 15px 0 5px; font-weight: bold; border-bottom: 2px solid #334155; margin-top: 10px; }
        .match-row { display: flex; align-items: center; justify-content: space-between; background: #1e293b; margin: 8px 0; padding: 12px; border-radius: 8px; }
        .team { width: 40%; text-align: center; font-weight: 600; }
        .score { background: linear-gradient(to right, #4f46e5, #ec4899); padding: 5px 15px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="match-container" id="match-list"></div>

<script>
    const sheetID = "1kx1u-vD_xSBHSVqCYZTPSl29U4l2yjGqE8EvJx07Ohc";
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    fetch(url)
        .then(res => res.text())
        .then(text => {
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const container = document.getElementById('match-list');
            
            json.table.rows.forEach(row => {
                const label = row.c[0]?.v; // คอลัมน์ A
                const teamHome = row.c[1]?.v; // คอลัมน์ B
                const score = row.c[2]?.v; // คอลัมน์ C
                const teamAway = row.c[3]?.v; // คอลัมน์ D

                // ถ้ามี Label ให้แสดงหัวข้อคั่น
                if (label) {
                    container.innerHTML += `<div class="date-label">${label}</div>`;
                }
                
                // แสดงผลตารางแมตช์
                if (teamHome && teamAway) {
                    container.innerHTML += `
                        <div class="match-row">
                            <div class="team">${teamHome}</div>
                            <div class="score">${score || "VS"}</div>
                            <div class="team">${teamAway}</div>
                        </div>
                    `;
                }
            });
        });
</script>
</body>
</html>
