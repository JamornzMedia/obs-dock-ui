<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muay Thai / Boxing Score Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ─── Base Reset ────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: #ffffff;
  }

  /* ─── Wrapper & skew configuration ───────────────────────── */
  .hud-container {
    display: flex;
    align-items: stretch;
    height: 66px; /* Matches premium TV height */
    filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.5));
  }

  /* Skew panel shapes */
  .panel {
    display: flex;
    align-items: center;
    position: relative;
    background: #0f172a; /* Slate 900 */
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }

  /* ─── Team A (Left Panel) ────────────────────────────────── */
  .team-panel-a {
    padding-left: 20px;
    padding-right: 15px;
    width: 250px;
    justify-content: flex-start;
    clip-path: polygon(10px 0%, 100% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%);
    border-left: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* Far-left red accent */
  .accent-red {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: #ef4444; /* Red 500 */
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
  }

  /* ─── Team B (Right Panel) ───────────────────────────────── */
  .team-panel-b {
    padding-left: 15px;
    padding-right: 20px;
    width: 250px;
    justify-content: flex-end;
    clip-path: polygon(0% 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    background: linear-gradient(90deg, #0f172a 0%, #1e293b 100%);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* Far-right blue accent */
  .accent-blue {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: #3b82f6; /* Blue 500 */
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
  }

  /* ─── Text Names ────────────────────────────────────────── */
  .team-name {
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #ffffff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    flex-grow: 1;
  }
  .team-name-a {
    text-align: left;
  }
  .team-name-b {
    text-align: right;
  }

  /* ─── Flags & Logos ──────────────────────────────────────── */
  .flag-container {
    width: 48px;
    height: 32px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1.5px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    background: rgba(0, 0, 0, 0.4);
    display: none; /* Shown dynamically if image exists */
    align-items: center;
    justify-content: center;
  }
  .flag-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .team-panel-a .flag-container {
    margin-left: 12px;
  }
  .team-panel-b .flag-container {
    margin-right: 12px;
  }

  /* ─── Center block ────────────────────────────────────────── */
  .center-panel {
    width: 156px;
    background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
    border-top: 2px solid #ffffff;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 15px rgba(0,0,0,0.25);
  }

  /* ─── Round Segments Header ────────────────────────────── */
  .center-header {
    position: absolute;
    top: -24px;
    width: 136px;
    height: 25px;
    background: #0f172a;
    border-radius: 6px 6px 0 0;
    border-top: 1.5px solid rgba(255, 255, 255, 0.15);
    border-left: 1.5px solid rgba(255, 255, 255, 0.15);
    border-right: 1.5px solid rgba(255, 255, 255, 0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 3px;
    gap: 2px;
  }

  .round-bar {
    display: flex;
    gap: 4px;
    width: 90px;
    justify-content: center;
  }

  .round-dash {
    flex: 1;
    height: 4px;
    background: #334155;
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .round-dash.active {
    background: #fbbf24; /* Active Gold */
    box-shadow: 0 0 6px #fbbf24;
  }

  /* Center Event Logo */
  .event-logo-container {
    width: 90px;
    height: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    overflow: hidden;
  }
  .event-logo-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* ─── Timer Display ─────────────────────────────────────── */
  .timer-display {
    font-size: 38px;
    font-weight: 900;
    color: #020617; /* Dark Slate */
    line-height: 1.05;
    letter-spacing: -1px;
    font-family: 'Outfit', sans-serif;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-top: 2px;
  }
  .timer-display.bump {
    transform: scale(1.1);
  }

  /* ─── Bottom Detail (Label 1) ───────────────────────────── */
  .bottom-detail {
    position: absolute;
    bottom: -16px;
    width: 120px;
    height: 16px;
    background: #020617;
    clip-path: polygon(5px 0%, calc(100% - 5px) 0%, 100% 100%, 0% 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  #label1 {
    font-size: 10px;
    font-weight: 800;
    color: #e2e8f0;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 110px;
  }
</style>
</head>
<body>

<div class="hud-container">
  <!-- Team A (Left Panel) -->
  <div class="panel team-panel-a">
    <div class="accent-red"></div>
    <div class="team-name team-name-a" id="nameA">YOD-IQ</div>
    <div class="flag-container" id="flagA-container">
      <img id="flagA" src="" alt="Flag A">
    </div>
  </div>

  <!-- Center Timer & Round Block -->
  <div class="panel center-panel">
    <!-- Round Dash Segment Bar & Event Logo -->
    <div class="center-header">
      <div class="round-bar">
        <div class="round-dash" id="dash1"></div>
        <div class="round-dash" id="dash2"></div>
        <div class="round-dash" id="dash3"></div>
      </div>
      <div class="event-logo-container">
        <img id="event-logo" src="" alt="" style="display: none;">
      </div>
    </div>

    <!-- Timer -->
    <div class="timer-display" id="timerText">0:00</div>

    <!-- Bottom detail (Label 1) -->
    <div class="bottom-detail">
      <span id="label1">MUAY THAI</span>
    </div>
  </div>

  <!-- Team B (Right Panel) -->
  <div class="panel team-panel-b">
    <div class="flag-container" id="flagB-container">
      <img id="flagB" src="" alt="Flag B">
    </div>
    <div class="team-name team-name-b" id="nameB">DAYAKAEV</div>
    <div class="accent-blue"></div>
  </div>
</div>

<script>
  // ─── Constants ───────────────────────────────────────────
  const VB_CHANNEL = 'vb_score_channel';
  const VB_STATE_KEY = 'vb_state';

  let prevTimer = '';

  // ─── Rendering functions ─────────────────────────────────
  function updateDashes(roundName) {
    const dashes = [
      document.getElementById('dash1'),
      document.getElementById('dash2'),
      document.getElementById('dash3')
    ];
    
    // Default: no dashes lit
    dashes.forEach(d => d.classList.remove('active'));

    // Map half/round strings ('1st', '2nd', '3rd', etc. or numbers '1', '2', '3') to round index
    let currentRound = 0;
    if (roundName) {
      const lower = roundName.toLowerCase();
      if (lower.includes('1st') || lower === '1') currentRound = 1;
      else if (lower.includes('2nd') || lower === '2') currentRound = 2;
      else if (lower.includes('3rd') || lower === '3') currentRound = 3;
      else if (lower.includes('4th') || lower === '4') currentRound = 3; // cap at 3
      else if (lower.includes('5th') || lower === '5') currentRound = 3;
      else if (lower.includes('6th') || lower === '6') currentRound = 3;
    }

    for (let i = 0; i < currentRound; i++) {
      if (dashes[i]) dashes[i].classList.add('active');
    }
  }

  function render(state) {
    if (!state) return;

    // Names
    document.getElementById('nameA').textContent = state.nameA || 'TEAM A';
    document.getElementById('nameB').textContent = state.nameB || 'TEAM B';

    // Label 1
    document.getElementById('label1').textContent = state.label1 || 'MUAY THAI';

    // Event Logo
    const logoImg = document.getElementById('event-logo');
    if (logoImg) {
      if (state.logoUrl) {
        logoImg.src = state.logoUrl;
        logoImg.style.display = 'block';
      } else {
        logoImg.style.display = 'none';
        logoImg.src = '';
      }
    }

    // Team A Flag/Logo
    const flagA = document.getElementById('flagA');
    const flagAContainer = document.getElementById('flagA-container');
    if (flagA && flagAContainer) {
      if (state.logoAUrl && !state.logoAUrl.includes('undefined')) {
        flagA.src = state.logoAUrl;
        flagAContainer.style.display = 'flex';
      } else {
        flagAContainer.style.display = 'none';
        flagA.src = '';
      }
    }

    // Team B Flag/Logo
    const flagB = document.getElementById('flagB');
    const flagBContainer = document.getElementById('flagB-container');
    if (flagB && flagBContainer) {
      if (state.logoBUrl && !state.logoBUrl.includes('undefined')) {
        flagB.src = state.logoBUrl;
        flagBContainer.style.display = 'flex';
      } else {
        flagBContainer.style.display = 'none';
        flagB.src = '';
      }
    }

    // Timer
    const timerTextEl = document.getElementById('timerText');
    const timerVal = state.timer || '0:00';
    timerTextEl.textContent = timerVal;
    
    // Bump animation on change
    if (timerVal !== prevTimer) {
      timerTextEl.classList.remove('bump');
      void timerTextEl.offsetWidth; // Reflow
      timerTextEl.classList.add('bump');
      prevTimer = timerVal;
    }

    // Round dashes
    updateDashes(state.half);
  }

  // ─── BroadcastChannel Listener ────────────────────────────
  try {
    const ch = new BroadcastChannel(VB_CHANNEL);
    ch.onmessage = e => {
      if (e.data?.type === 'vb_update') {
        render(e.data.payload);
      }
    };
  } catch (_) {}

  // ─── LocalStorage Fallback Listener ───────────────────────
  window.addEventListener('storage', e => {
    if (e.key === VB_STATE_KEY && e.newValue) {
      try { render(JSON.parse(e.newValue)); } catch (_) {}
    }
  });

  // ─── Initial Load ────────────────────────────────────────
  (function init() {
    try {
      const saved = localStorage.getItem(VB_STATE_KEY);
      if (saved) render(JSON.parse(saved));
    } catch (_) {}
  })();
</script>
</body>
</html>
