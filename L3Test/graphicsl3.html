<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>L3 Graphics Renderer - Browser Source</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,500;0,700;1,700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: transparent;
            color: #fff;
            font-family: 'Kanit', 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* Container for all active cards */
        #graphics-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            height: 100%;
        }

        /* --- BASE GRAPHIC CARD --- */
        .graphic-card {
            display: flex;
            align-items: center;
            background: rgba(20, 20, 20, 0.85);
            border-left: 5px solid #00aaff;
            border-radius: 6px;
            padding: 12px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: fit-content;
            max-width: 100%;
            gap: 15px;
            position: relative;
            
            /* Animation transitions */
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animations */
        /* Slide in */
        .graphic-card.trans-slide {
            transform: translateX(-120%);
        }
        .graphic-card.trans-slide.active {
            transform: translateX(0);
            opacity: 1;
        }

        /* Fade */
        .graphic-card.trans-fade {
            transform: none;
        }
        .graphic-card.trans-fade.active {
            opacity: 1;
        }

        /* Zoom */
        .graphic-card.trans-zoom {
            transform: scale(0.6);
        }
        .graphic-card.trans-zoom.active {
            transform: scale(1);
            opacity: 1;
        }

        /* Hidden cards should still animate out before disappearing */
        .graphic-card.hidden {
            display: none !important;
        }

        /* --- COMPONENT STYLES --- */
        .field-id {
            font-weight: 700;
            color: #888;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            min-width: 25px;
        }

        .field-image {
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            background: #111;
        }

        .field-text-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .field-name {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.3px;
        }

        .field-label {
            font-size: 14px;
            color: #ccc;
            font-weight: 300;
        }

        /* --- DOUBLE SIDE-BY-SIDE GRAPHIC --- */
        .double-standard-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .double-divider {
            width: 2px;
            height: 35px;
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- SPORTS SUBSTITUTION MODE --- */
        .sports-sub-card {
            width: 500px;
            height: 90px;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 8px;
            border-left: 6px solid #ff3333; /* Default border color */
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            display: flex;
            position: relative;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Transition classes for sports sub */
        .sports-sub-card.trans-slide {
            transform: translateX(-120%);
        }
        .sports-sub-card.trans-slide.active {
            transform: translateX(0);
            opacity: 1;
        }
        .sports-sub-card.trans-fade {
            transform: none;
        }
        .sports-sub-card.trans-fade.active {
            opacity: 1;
        }
        .sports-sub-card.trans-zoom {
            transform: scale(0.6);
        }
        .sports-sub-card.trans-zoom.active {
            transform: scale(1);
            opacity: 1;
        }
        .sports-sub-card.hidden {
            display: none !important;
        }

        /* Substitution badge/icon panel */
        .sports-icon-panel {
            width: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .sports-icon-panel svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 102, 0.4));
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Sliding track for swapping names */
        .sports-content-slider {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .sports-slider-track {
            display: flex;
            flex-direction: column;
            height: 200%; /* Two screens high */
            transition: transform 0.7s cubic-bezier(0.76, 0, 0.24, 1);
        }

        /* Swap Y translation */
        .sports-sub-card.swapped .sports-slider-track {
            transform: translateY(-50%);
        }

        .sports-row {
            height: 50%; /* Each row takes 50% of the track (which is 90px) */
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .sports-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sports-badge.out {
            background: #ff3333;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
        }

        .sports-badge.in {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }

        .sports-arrow-glow {
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from {
                filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.2));
            }
            to {
                filter: drop-shadow(0 0 8px var(--glow-color, #00ff66));
            }
        }
    </style>
</head>
<body>

    <div id="graphics-container">
        <!-- Rendered graphics will appear here -->
    </div>

    <script>
        // Track the intervals for substitution card animations
        const subCardIntervals = {};

        // Listen for data updates from the control dock
        const bc = new BroadcastChannel('l3_graphics_channel');

        bc.onmessage = function (event) {
            if (event.data && event.data.type === 'STATE_UPDATE') {
                renderGraphics(event.data.cards);
            }
        };

        // On load, request current state from the control center
        window.addEventListener('load', () => {
            console.log("Graphics renderer loaded, requesting state...");
            bc.postMessage({ type: 'REQUEST_STATE' });
        });

        // Function to build and update elements in DOM
        function renderGraphics(cards) {
            const container = document.getElementById('graphics-container');
            
            // Loop through all cards and manage their DOM presence
            cards.forEach(card => {
                const isGraphicsEnabled = card.graphicsSettings && card.graphicsSettings.enabled;
                const cardId = card.id;
                const elementId = `card-g-${cardId}`;
                let el = document.getElementById(elementId);

                // If not enabled, make sure it is hidden/removed
                if (!isGraphicsEnabled) {
                    if (el) {
                        el.classList.add('hidden');
                        el.classList.remove('active');
                        // Clean up substitution loop if it was a sports sub card
                        if (subCardIntervals[cardId]) {
                            clearInterval(subCardIntervals[cardId]);
                            delete subCardIntervals[cardId];
                        }
                    }
                    return;
                }

                // Prepare configuration
                const gs = card.graphicsSettings;
                const transitionClass = `trans-${gs.transition || 'slide'}`;
                const isSportsSubMode = card.type === 'double' && gs.mode === 'sports';

                // Calculate CSS values
                const bgStyle = `${gs.bgColor || '#141414'}`;
                const opacityVal = gs.bgOpacity !== undefined ? gs.bgOpacity : 0.85;
                const finalBg = bgStyle.startsWith('rgba') ? bgStyle : hexToRgba(bgStyle, opacityVal);
                const themeColor = gs.themeColor || '#00aaff';
                const borderRadius = `${gs.borderRadius !== undefined ? gs.borderRadius : 6}px`;

                // If the element doesn't exist, create it!
                if (!el) {
                    el = document.createElement('div');
                    el.id = elementId;
                    container.appendChild(el);
                }

                // Reset base structure classes
                el.className = isSportsSubMode ? 'sports-sub-card' : 'graphic-card';
                el.classList.add(transitionClass);
                el.classList.remove('hidden');

                // Apply custom styling variables
                el.style.backgroundColor = finalBg;
                el.style.borderRadius = borderRadius;

                if (isSportsSubMode) {
                    // Update border colors dynamically based on Out/In state
                    el.style.borderLeftColor = '#ff3333'; // Default to red OUT
                    renderSportsSubCard(el, card, gs);
                } else {
                    el.style.borderLeftColor = themeColor;
                    renderStandardCard(el, card, gs);
                }

                // Trigger Visibility Transition
                if (card.isVisible) {
                    // Slight delay to ensure DOM styles apply before animating
                    setTimeout(() => {
                        el.classList.add('active');
                    }, 50);
                } else {
                    el.classList.remove('active');
                    // Reset swap interval if hiding sports sub card
                    if (isSportsSubMode) {
                        el.classList.remove('swapped');
                        el.style.borderLeftColor = '#ff3333'; // Reset border to Out
                    }
                }
            });
        }

        // Standard card builder (handles Single Card and Standard Double Card)
        function renderStandardCard(el, card, gs) {
            // Sort fields by their orders
            const fieldsConfig = [];
            Object.keys(gs.fields).forEach(key => {
                if (gs.fields[key].show) {
                    fieldsConfig.push({ key: key, ...gs.fields[key] });
                }
            });
            fieldsConfig.sort((a, b) => a.order - b.order);

            // Double card standard layout container wrapper
            if (card.type === 'double') {
                let html = '<div class="double-standard-container">';
                
                // Left Side (Home)
                html += '<div style="display:flex; align-items:center; gap:12px;">';
                html += renderFieldsHTML(fieldsConfig, card.selectedItemHome);
                html += '</div>';

                // Middle Divider
                html += '<div class="double-divider"></div>';

                // Right Side (Away)
                html += '<div style="display:flex; align-items:center; gap:12px;">';
                html += renderFieldsHTML(fieldsConfig, card.selectedItemAway);
                html += '</div>';

                html += '</div>';
                el.innerHTML = html;
            } else {
                // Single card simple layout
                el.innerHTML = renderFieldsHTML(fieldsConfig, card.selectedItem);
            }
        }

        // Helper to output fields HTML aligned in columns
        function renderFieldsHTML(fieldsConfig, item) {
            if (!item) {
                return '<div style="font-style:italic; color:#666; font-size:12px;">(ไม่มีข้อมูล)</div>';
            }

            let html = '';
            
            // Collect text fields so we can wrap them in a group if they are adjacent
            let textGroupHtml = '';

            fieldsConfig.forEach(f => {
                const val = getFieldValue(f.key, item);
                
                if (f.key === 'image') {
                    // Flush text group first if any
                    if (textGroupHtml) {
                        html += `<div class="field-text-group">${textGroupHtml}</div>`;
                        textGroupHtml = '';
                    }

                    const imgUrl = val ? val : '';
                    if (imgUrl) {
                        html += `<img class="field-image" src="${imgUrl}" style="width:${f.width}px; height:${f.width}px;" onerror="this.style.display='none'">`;
                    }
                } else if (f.key === 'id') {
                    if (textGroupHtml) {
                        html += `<div class="field-text-group">${textGroupHtml}</div>`;
                        textGroupHtml = '';
                    }
                    html += `<div class="field-id" style="font-size:${f.size}px; color:${f.color || '#888'}; min-width:${f.width}px;">${val}</div>`;
                } else {
                    // Text fields (name, label1, label2, label3) group vertically
                    const labelClass = f.key === 'name' ? 'field-name' : 'field-label';
                    textGroupHtml += `<div class="${labelClass}" style="color:${f.color || '#fff'}; font-size:${f.size}px; width:${f.width ? f.width + 'px' : 'auto'};">${val}</div>`;
                }
            });

            // Flush remaining text group
            if (textGroupHtml) {
                html += `<div class="field-text-group">${textGroupHtml}</div>`;
            }

            return html;
        }

        // Sports Substitution Renderer (with slide/swap animation)
        function renderSportsSubCard(el, card, gs) {
            const cardId = card.id;

            // Generate contents inside only once or update when items change
            const itemHome = card.selectedItemHome || { name: 'Player Out', label1: 'HOME' };
            const itemAway = card.selectedItemAway || { name: 'Player In', label1: 'AWAY' };

            // We need a unique sub-render key to prevent recreating the DOM (restarting transition animations) on every simple value update
            const renderStateKey = `${itemHome.name}_${itemAway.name}`;
            if (el.dataset.renderKey === renderStateKey) {
                return; // DOM matches state, let swap loop run
            }
            el.dataset.renderKey = renderStateKey;

            // SVGs for Substitution Arrows
            const subArrowsSVG = `
                <svg viewBox="0 0 24 24" fill="none" class="sports-arrow-glow" style="--glow-color: #00ff66;">
                    <!-- Out Red Arrow (Down/Left) -->
                    <path d="M7 17L17 7" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M7 9V17H15" stroke="#ff3333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- In Green Arrow (Up/Right) -->
                    <path d="M17 7L7 17" stroke="#00ff66" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M17 15V7H9" stroke="#00ff66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            `;

            // Draw layouts
            let html = '';
            // Left Panel (Arrows icon)
            html += `<div class="sports-icon-panel">${subArrowsSVG}</div>`;

            // Slider Content
            html += '<div class="sports-content-slider">';
            html += '<div class="sports-slider-track">';

            // Row 1: OUT (Home side)
            html += '<div class="sports-row row-out">';
            html += '<span class="sports-badge out">OUT ⬇️</span>';
            html += '<div style="display:flex; flex-direction:column;">';
            html += `<div style="font-size:18px; font-weight:700; color:#fff;">${itemHome.name}</div>`;
            if (itemHome.label1) html += `<div style="font-size:11px; color:#aaa;">${itemHome.label1}</div>`;
            html += '</div>';
            html += '</div>';

            // Row 2: IN (Away side)
            html += '<div class="sports-row row-in">';
            html += '<span class="sports-badge in">IN ⬆️</span>';
            html += '<div style="display:flex; flex-direction:column;">';
            html += `<div style="font-size:18px; font-weight:700; color:#fff;">${itemAway.name}</div>`;
            if (itemAway.label1) html += `<div style="font-size:11px; color:#aaa;">${itemAway.label1}</div>`;
            html += '</div>';
            html += '</div>';

            html += '</div>'; // end track
            html += '</div>'; // end slider

            el.innerHTML = html;

            // Start Substitution Auto Swap Interval
            if (subCardIntervals[cardId]) {
                clearInterval(subCardIntervals[cardId]);
            }

            // Every 3.5 seconds, slide up/down to show the other player
            subCardIntervals[cardId] = setInterval(() => {
                if (!card.isVisible || !el.classList.contains('active')) return;
                
                const isSwapped = el.classList.toggle('swapped');
                // Adjust border color based on who's showing
                el.style.borderLeftColor = isSwapped ? '#00ff66' : '#ff3333';
                
                // Adjust rotation of arrows icon slightly to signify active swap
                const svg = el.querySelector('.sports-icon-panel svg');
                if (svg) {
                    svg.style.transform = isSwapped ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            }, 3500);
        }

        // Helper to grab fields from item
        function getFieldValue(key, item) {
            if (!item) return '';
            if (key === 'id') return item.id || '';
            if (key === 'image') return item.image || '';
            if (key === 'name') return item.name || '';
            if (key === 'label1') return item.label1 || '';
            if (key === 'label2') return item.label2 || '';
            if (key === 'label3') return item.label3 || '';
            return '';
        }

        // Helper to convert color hex to rgba format
        function hexToRgba(hex, alpha) {
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
    </script>
</body>
</html>
