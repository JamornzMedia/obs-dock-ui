<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volleyball Score Main Overlay</title>
<link rel="stylesheet" href="fcp_v2_assets/volleyball_style.css">
</head>
<body>

<div id="vb-overlay">
  <div class="logo-area">
    <img id="vb-logo" class="logo-img" src="" alt="Logo" style="display:none;">
  </div>
  
  <div class="teams-area">
    <div class="team-row" id="panelA">
      <div id="nameA">TEAM A</div>
      <div class="serve-indicator" id="serveA"></div>
      <div class="timeouts" id="timeoutsA"></div>
    </div>
    <div class="team-row" id="panelB">
      <div id="nameB">TEAM B</div>
      <div class="serve-indicator" id="serveB"></div>
      <div class="timeouts" id="timeoutsB"></div>
    </div>
  </div>

  <div class="sets-won-area">
    <div class="sets-won-row" id="setsA">0</div>
    <div class="sets-won-row" id="setsB">0</div>
  </div>

  <div class="scores-area" id="main-score">
    <div class="score-col active">
      <div class="score-cell" id="scoreA">0</div>
      <div class="score-cell" id="scoreB">0</div>
    </div>
  </div>
</div>

<script src="fcp_v2_assets/volleyball_overlay.js"></script>
</body>
</html>
