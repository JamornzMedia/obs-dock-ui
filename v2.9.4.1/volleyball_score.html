<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volleyball Score Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --team-a-color: #1e3a8a;
    --team-b-color: #7f1d1d;
    --accent: #f59e0b;
    --glass-bg: rgba(10, 14, 26, 0.82);
    --glass-border: rgba(255, 255, 255, 0.10);
    --text-main: #ffffff;
    --text-muted: rgba(255,255,255,0.55);
    --dot-active: #f59e0b;
    --dot-inactive: rgba(255,255,255,0.18);
    --history-bg: rgba(0,0,0,0.38);
    --transition: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Barlow Condensed', 'Barlow', sans-serif;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 100vh;
    padding-bottom: 32px;
    overflow: hidden;
  }

  /* ═══════════════════════════════════ MAIN CONTAINER */
  #vb-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transform-origin: bottom center;
  }

  /* ═══════════════════════════════════ HISTORY TABLE */
  #history-table-wrap {
    width: 100%;
    max-width: 560px;
    background: var(--history-bg);
    backdrop-filter: blur(10px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: 10px 10px 0 0;
    padding: 6px 14px 10px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  #history-table-wrap.visible { opacity: 1; transform: translateY(0); }

  #history-table-wrap table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  #history-table-wrap table thead tr th {
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 2px 6px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #history-table-wrap table tbody tr td {
    text-align: center;
    padding: 3px 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
  }
  .hist-winner { color: var(--accent) !important; }
  .hist-set-label {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    text-align: left !important;
  }

  /* ═══════════════════════════════════ SCOREBOARD */
  #scoreboard {
    display: flex;
    align-items: stretch;
    width: 560px;
    min-height: 88px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(1.6);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.55),
      0 1px 0 rgba(255,255,255,0.08) inset;
    position: relative;
  }

  /* Shine line */
  #scoreboard::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  }

  /* ═══════════════════════════════════ TEAM PANEL */
  .team-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    position: relative;
    transition: background 0.6s ease;
  }
  .team-panel.team-a {
    border-right: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(135deg, rgba(30,58,138,0.35) 0%, transparent 70%);
  }
  .team-panel.team-b {
    border-left: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(225deg, rgba(127,29,29,0.35) 0%, transparent 70%);
  }

  /* Team color accent bar */
  .team-panel.team-a::before {
    content: '';
    position: absolute;
    left: 0; top: 16%; bottom: 16%;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: var(--team-a-color);
    transition: background 0.5s;
  }
  .team-panel.team-b::after {
    content: '';
    position: absolute;
    right: 0; top: 16%; bottom: 16%;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--team-b-color);
    transition: background 0.5s;
  }

  /* Dots (Sets Won) */
  .sets-dots {
    display: flex;
    gap: 5px;
    margin-bottom: 5px;
    min-height: 10px;
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--dot-inactive);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
  }
  .dot.won {
    background: var(--dot-active);
    box-shadow: 0 0 8px var(--dot-active), 0 0 0 1px var(--dot-active);
    transform: scale(1.2);
  }

  /* Current Set Score */
  .current-score {
    font-size: 58px;
    font-weight: 900;
    line-height: 1;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.5);
    transition: transform var(--transition), color 0.3s;
    letter-spacing: -2px;
  }
  .current-score.bump {
    transform: scale(1.25);
    color: var(--accent);
  }

  /* ═══════════════════════════════════ CENTER DIVIDER */
  #center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 10px;
    gap: 4px;
    min-width: 56px;
  }
  #vs-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  #set-number-badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .divider-line {
    width: 1px;
    height: 30px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
  }

  /* ═══════════════════════════════════ POINT LIMIT BADGE */
  #point-limit-badge {
    position: absolute;
    top: 5px;
    right: 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════ SCORE CHANGE FLASH */
  @keyframes flashGlow {
    0%   { box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 0 rgba(245,158,11,0); }
    30%  { box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 40px 10px rgba(245,158,11,0.4); }
    100% { box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.08) inset; }
  }
  #scoreboard.flash-a { animation: flashGlow 0.8s ease-out; }
  #scoreboard.flash-b { animation: flashGlow 0.8s ease-out; }

  /* ═══════════════════════════════════ SET LIMIT INDICATOR */
  .set-limit-bar {
    height: 3px;
    border-radius: 0 0 4px 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .set-limit-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: inherit;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    opacity: 0.7;
  }

  /* ═══════════════════════════════════ HIDDEN */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="vb-overlay">

  <!-- History Table (shows when sets > 0) -->
  <div id="history-table-wrap">
    <table>
      <thead>
        <tr>
          <th class="hist-set-label">Set</th>
          <th style="color:#93c5fd">Team A</th>
          <th style="color:#fca5a5">Team B</th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        <!-- Rows injected by JS -->
      </tbody>
    </table>
  </div>

  <!-- Main Scoreboard -->
  <div id="scoreboard">
    <span id="point-limit-badge">PT 25</span>

    <!-- Team A Panel -->
    <div class="team-panel team-a" id="panelA">
      <div class="sets-dots" id="dotsA"></div>
      <div class="current-score" id="scoreA">0</div>
    </div>

    <!-- Center Column -->
    <div id="center-col">
      <div class="divider-line"></div>
      <div id="vs-label">VS</div>
      <div id="set-number-badge">SET 1</div>
      <div class="divider-line"></div>
    </div>

    <!-- Team B Panel -->
    <div class="team-panel team-b" id="panelB">
      <div class="sets-dots" id="dotsB"></div>
      <div class="current-score" id="scoreB">0</div>
    </div>
  </div>

  <!-- Progress bar toward set point limit (cosmetic for both teams) -->
  <div style="display:flex; gap:4px; width:560px;">
    <div class="set-limit-bar" style="flex:1">
      <div class="set-limit-fill" id="progressA"></div>
    </div>
    <div class="set-limit-bar" style="flex:1">
      <div class="set-limit-fill" id="progressB"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  VOLLEYBALL SCORE OVERLAY  —  volleyball_score.html
//  Receives state via BroadcastChannel 'vb_score_channel'
// ═══════════════════════════════════════════════════════════════

const VB_CHANNEL = 'vb_score_channel';
const VB_STATE_KEY = 'vb_state';
const MAX_SETS = 5; // Max sets in a match (for dot display)

let state = {
  scoreA: 0,
  scoreB: 0,
  setsA: 0,
  setsB: 0,
  setHistory: [],
  setLimit: 25,
  colorA: '#1e3a8a',
  colorB: '#7f1d1d',
};

// ──────────────────────────────────────── RENDER
function renderDots(containerId, won, maxSets) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  const total = Math.max(maxSets, Math.ceil(MAX_SETS / 2) + 1, 3);
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < won ? ' won' : '');
    el.appendChild(d);
  }
}

function renderHistory(history) {
  const tbody = document.getElementById('history-tbody');
  const wrap = document.getElementById('history-table-wrap');
  tbody.innerHTML = '';

  if (!history || history.length === 0) {
    wrap.classList.remove('visible');
    return;
  }

  history.forEach((set, idx) => {
    const tr = document.createElement('tr');
    const winnerA = set[0] > set[1];
    const winnerB = set[1] > set[0];
    tr.innerHTML = `
      <td class="hist-set-label">Set ${idx + 1}</td>
      <td class="${winnerA ? 'hist-winner' : ''}">${set[0]}</td>
      <td class="${winnerB ? 'hist-winner' : ''}">${set[1]}</td>
    `;
    tbody.appendChild(tr);
  });

  wrap.classList.add('visible');
}

function renderScoreboard(newState, prevState) {
  const { scoreA, scoreB, setsA, setsB, setHistory, setLimit, colorA, colorB } = newState;
  const currentSet = setHistory.length + 1;
  const winsNeeded = 3; // For best of 5

  // Update CSS color variables
  document.documentElement.style.setProperty('--team-a-color', colorA);
  document.documentElement.style.setProperty('--team-b-color', colorB);

  // Scores with bump animation
  const elA = document.getElementById('scoreA');
  const elB = document.getElementById('scoreB');

  if (prevState && scoreA !== prevState.scoreA) {
    elA.classList.remove('bump');
    void elA.offsetWidth; // reflow
    elA.classList.add('bump');
    setTimeout(() => elA.classList.remove('bump'), 500);
    document.getElementById('scoreboard').classList.remove('flash-a');
    void document.getElementById('scoreboard').offsetWidth;
    document.getElementById('scoreboard').classList.add('flash-a');
    setTimeout(() => document.getElementById('scoreboard').classList.remove('flash-a'), 900);
  }
  if (prevState && scoreB !== prevState.scoreB) {
    elB.classList.remove('bump');
    void elB.offsetWidth;
    elB.classList.add('bump');
    setTimeout(() => elB.classList.remove('bump'), 500);
  }

  elA.textContent = scoreA;
  elB.textContent = scoreB;

  // Dots
  renderDots('dotsA', setsA, winsNeeded);
  renderDots('dotsB', setsB, winsNeeded);

  // Set label
  document.getElementById('set-number-badge').textContent = `SET ${currentSet}`;

  // Point limit badge
  document.getElementById('point-limit-badge').textContent = `PT ${setLimit}`;

  // Progress bars (capped at limit)
  const pctA = Math.min(100, (scoreA / setLimit) * 100);
  const pctB = Math.min(100, (scoreB / setLimit) * 100);
  document.getElementById('progressA').style.width = pctA + '%';
  document.getElementById('progressB').style.width = pctB + '%';

  // History
  renderHistory(setHistory);
}

// ──────────────────────────────────────── STATE UPDATE
function applyState(newState, isInitial = false) {
  const prev = isInitial ? null : { ...state };
  state = { ...state, ...newState };
  renderScoreboard(state, prev);
}

// ──────────────────────────────────────── BROADCAST CHANNEL
const channel = new BroadcastChannel(VB_CHANNEL);
channel.onmessage = (e) => {
  if (e.data && e.data.type === 'vb_update') {
    applyState(e.data.payload);
  }
};

// ──────────────────────────────────────── ALSO WATCH LOCALSTORAGE (fallback)
window.addEventListener('storage', (e) => {
  if (e.key === VB_STATE_KEY && e.newValue) {
    try {
      applyState(JSON.parse(e.newValue));
    } catch (_) {}
  }
});

// ──────────────────────────────────────── INITIAL LOAD FROM LOCALSTORAGE
(function init() {
  try {
    const saved = localStorage.getItem(VB_STATE_KEY);
    if (saved) applyState(JSON.parse(saved), true);
    else renderScoreboard(state, null);
  } catch (_) {
    renderScoreboard(state, null);
  }
})();
</script>
</body>
</html>
