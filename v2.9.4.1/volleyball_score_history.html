<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volleyball History Overlay</title>
<link rel="stylesheet" href="fcp_v2_assets/volleyball_style.css">
</head>
<body>

<div id="vb-wrapper">
<div id="vb-overlay">
  <div class="logo-area">
    <img id="vb-logo" class="logo-img" src="" alt="Logo" style="display:none;">
  </div>
  
  <div class="teams-area">
    <div class="team-row" id="panelA">
      <div id="nameA">TEAM A</div>
    </div>
    <div class="team-row" id="panelB">
      <div id="nameB">TEAM B</div>
    </div>
  </div>

  <div class="sets-won-area">
    <div class="sets-won-row" id="setsA">0</div>
    <div class="sets-won-row" id="setsB">0</div>
  </div>

  <div class="scores-area" id="history-scores">
    <!-- JS will populate score columns here -->
  </div>
</div>

<div id="timeout-banner-a" class="timeout-drop">TIMEOUT TEAM A</div>
<div id="timeout-banner-b" class="timeout-drop">TIMEOUT TEAM B</div>
</div>

<script src="fcp_v2_assets/volleyball_overlay.js"></script>
</body>
</html>
